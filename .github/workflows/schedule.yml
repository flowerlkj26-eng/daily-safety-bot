name: Daily Safety Report Automation

on:
  schedule:
    # 매일 UTC 21:25 (한국시간 06:25)에 실행
    - cron: '25 21 * * *'
  # 수동 실행을 위한 트리거
  workflow_dispatch:

jobs:
  run-crawler-and-send:
    runs-on: ubuntu-latest
    
    steps:
    - name: 저장소 체크아웃
      uses: actions/checkout@v3

    - name: Python 환경 설정
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 필수 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: 스크립트 실행 (웹 크롤링 및 카카오톡 발송)
      env:
        # GitHub Secrets에 등록된 값을 환경 변수로 주입 (절대 노출 방지)
        KAKAO_TOKEN: ${{ secrets.KAKAO_TOKEN }}
      run: |
        python main.py
